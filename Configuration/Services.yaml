services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  Wazum\LiveReload\:
    resource: '../Classes/*'
    exclude: '../Classes/AdminPanel/*'

  Wazum\LiveReload\Hook\ClearCachePostProcHook:
    public: true

  Wazum\LiveReload\Middleware\PollEndpointMiddleware:
    public: true

  Wazum\LiveReload\Middleware\TagInjectionMiddleware:
    public: true
    arguments:
      $systemResourceFactory: '@?TYPO3\CMS\Core\SystemResource\SystemResourceFactory'
      $systemResourcePublisher: '@?TYPO3\CMS\Core\SystemResource\Publishing\SystemResourcePublisherInterface'

  Wazum\LiveReload\Resolver\DevServerUrlResolver:
    arguments:
      $viteAssetCollectorService: '@?Praetorius\ViteAssetCollector\Service\ViteService'

  Wazum\LiveReload\Broadcast\BroadcastLogInterface:
    alias: Wazum\LiveReload\Broadcast\DatabaseBroadcastLog

  Wazum\LiveReload\Broadcaster\TagBroadcasterInterface:
    alias: Wazum\LiveReload\Broadcaster\CompositeBroadcaster

  Wazum\LiveReload\Runtime\ResponseDetacher:
    alias: Wazum\LiveReload\Runtime\SapiResponseDetacher
